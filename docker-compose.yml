version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: myfinances-db
    environment:
      POSTGRES_DB: myfinances
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10.0
    container_name: myfinances-migrations
    command: -url=jdbc:postgresql://db:5432/myfinances -user=postgres -password=postgres -connectRetries=60 migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - db

volumes:
  pgdata:
